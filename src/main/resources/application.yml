server:
  port: 8888
  servlet:
    context-path: /
  # SSL 配置（用于局域网 HTTPS 开发测试）
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: numberbomb
    key-store-type: PKCS12
    key-alias: numberbomb

spring:
  application:
    name: number-bomb-backend
  
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:number_bomb}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:3301359a}
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# JWT配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-number-bomb-game}
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 微信小程序配置
wx:
  miniapp:
    app-id: ${WX_APP_ID:your-app-id}
    app-secret: ${WX_APP_SECRET:your-app-secret}

# 日志配置
logging:
  level:
    com.numberbomb: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 游戏配置
game:
  room:
    expire-minutes: 15
  match:
    timeout-seconds: 60
  countdown:
    seconds: 15


# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
